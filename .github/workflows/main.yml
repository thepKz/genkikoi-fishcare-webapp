name: CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - '**/*.tsx'
      - '**/*.ts'
      - '**/*.js'
      - '**/*.json'
      - '**/*.xml'
      - '**/*.yml'
      - '**/*.yaml'
      - 'vite.config.*'
      - 'package.json'
      - 'package-lock.json'
      - 'client/**'
      - 'server/**'
      - 'admin/**'
      - '.github/workflows/**'

  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**/*.tsx'
      - '**/*.ts'
      - '**/*.js'
      - '**/*.json'
      - '**/*.xml'
      - '**/*.yml'
      - '**/*.yaml'
      - 'vite.config.*'
      - 'package.json'
      - 'package-lock.json'
      - 'client/**'
      - 'server/**'
      - 'admin/**'
      - '.github/workflows/**'

  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  statuses: write
  deployments: write

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Use Node.js 24 LTS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
            admin/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server tests with coverage
        working-directory: server
        run: |
          npm run test -- --coverage --coverageReporters=lcov --coverageReporters=json-summary
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}



      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          VITE_BASE_apiKey: ${{ secrets.VITE_BASE_APIKEY }}
          VITE_BASE_authDomain: ${{ secrets.VITE_BASE_AUTHDOMAIN }}
          VITE_BASE_projectId: ${{ secrets.VITE_BASE_PROJECTID }}
          VITE_BASE_storageBucket: ${{ secrets.VITE_BASE_STORAGEBUCKET }}
          VITE_BASE_messagingSenderId: ${{ secrets.VITE_BASE_MESSAGINGSENDERID }}
          VITE_BASE_appId: ${{ secrets.VITE_BASE_APPID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload client artifact
        uses: actions/upload-artifact@v7
        with:
          name: client-dist
          path: client/dist
          if-no-files-found: error
          retention-days: 7

    

  deploy-staging:
    name: Deploy Client Staging
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download client artifact
        uses: actions/download-artifact@v8
        with:
          name: client-dist
          path: ./client/dist

      - name: Deploy client to Netlify staging
        uses: nwtgck/actions-netlify@v4.0.0
        with:
          publish-dir: './client/dist'
          production-branch: develop
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy client staging from GitHub Actions'
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_STAGING_SITE_ID }}
